# Temporary config used ONLY during the initial TLS bootstrap (see
# init-tls.sh). Serves plain HTTP so certbot's HTTP-01 webroot challenge can
# complete, and proxies everything else to Strapi in the meantime so the
# admin panel is usable immediately without waiting on the cert.
#
# init-tls.sh copies this file (verbatim, no substitution needed) to
# nginx/conf.d/default.conf before the certbot run, then overwrites it with
# the real default.conf.template once the cert exists.

server {
    listen 80;
    server_name _;

    # Default 1M is too small for full-resolution astrophotography uploads.
    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://strapi:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
