# Builds the Strapi CMS image in CI and pushes it to GHCR. The VM only ever
# `docker compose pull`s this already-built image, never builds it locally
# (keeps the VM's setup to just "run containers", regardless of its specs).
# See docker-compose.yml and deploy.sh.
#
# Built for linux/arm64 because the VM is an Oracle Ampere (ARM) instance —
# GitHub's hosted runners are amd64, so this cross-builds via QEMU
# (docker/setup-qemu-action). If the VM ever moves back to x86, add
# linux/amd64 back to the `platforms` list below.

name: Build and push CMS image

on:
  push:
    branches: [main]
    paths:
      - 'cms/**'
      - '.github/workflows/build-cms.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./cms
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my_portfolio-cms:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
